<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zedo AI | Cosmic Knowledge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="space-container">
        <div class="nebula-bg"></div>

        <aside class="sidebar">
            <div class="new-orbit-btn">
                <svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>New Orbit</span>
            </div>
            <div class="log-label">Archived Logs</div>
            <ul id="notesList" class="notes-log">
                </ul>
        </aside>

        <main class="intelligence-hub">
            <header class="header">
                <h1>Zedo<span>.core</span></h1>
                <div class="user-signal">Z</div>
            </header>

            <div id="chatDisplay" class="chat-viewport">
                <div class="arrival-msg">
                    <h2>Welcome to the Core, Commander.</h2>
                    <p>Which knowledge logs shall we analyze today?</p>
                </div>
            </div>

            <div class="command-zone">
                <div class="command-bar">
                    <label for="fileInput" class="data-stream-btn" title="Sync Data Stream (.txt)">
                        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.93 1.57 3.5 3.5 3.5s3.5-1.57 3.5-3.5V5c0-2.76-2.24-5-5-5S7 2.24 7 5v12.5c0 3.87 3.13 7 7 7s7-3.13 7-7V6h-1.5z"/></svg>
                        <input type="file" id="fileInput" accept=".txt">
                    </label>
                    <input type="text" id="userInput" placeholder="Transmit a prompt..." autocomplete="off">
                    <button id="sendBtn" class="transmit-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                <p class="deep-space-comms">Deep Space Transmissions may be subject to minor data inaccuracies.</p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
